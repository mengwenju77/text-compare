name: Build and Deploy to EdgeOne

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy to EdgeOne Pages
        # 使用 npx 直接运行 edgeone cli 进行部署
        # -n 指定项目名称，-t 指定 API Token
        # 部署当前目录 (.)
        run: npx edgeone pages deploy . -n text-compare -t ${{ secrets.EDGEONE_API_TOKEN }}
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
